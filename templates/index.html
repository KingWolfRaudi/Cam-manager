<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central CCTV - Cam-manager</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 8px 0; font-size: 1rem; }
        .visor { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 5px; margin-bottom: 8px; display: block; object-fit: contain; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #444; color: white; font-weight: bold; font-size: 0.85rem; }
        button.active { background: #4CAF50; }
        button.recording { background: #f44336; }
        select.resolution { width: 100%; margin-top: 6px; padding: 6px; border-radius: 4px; background: #333; color: white; border: 1px solid #555; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Central de Vigilancia</h1>
    <div class="grid" id="camGrid"></div>

    <script>
        let camCards = [];

        async function updateCard(card, camId) {
            const res = await fetch(`/status/${camId}`);
            const data = await res.json();
            const btnEnc = card.querySelector('.btnEncendido');
            const btnRec = card.querySelector('.btnVideo');
            const btnDet = card.querySelector('.btnMovimiento');
            const visor = card.querySelector('.visor');
            
            btnEnc.innerText = data.active ? "Apagar" : "Encender";
            btnEnc.className = `btnEncendido ${data.active ? 'active' : ''}`;
            
            btnRec.innerText = data.recording ? "Detener Grabar" : "Grabar";
            btnRec.className = `btnVideo ${data.recording ? 'recording' : ''}`;
            
            btnDet.innerText = data.motion ? "Det: ON" : "Det: OFF";
            btnDet.className = `btnMovimiento ${data.motion ? 'active' : ''}`;

            if (data.active) {
                if (!visor.src.includes(`/video_feed/${camId}`)) {
                    visor.src = `/video_feed/${camId}?t=` + new Date().getTime();
                }
            } else {
                visor.removeAttribute('src');
            }
        }

        async function action(camId, endpoint, card) {
            const res = await fetch(endpoint, { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ camera_id: camId })
            });
            if (endpoint === '/tomar_foto') {
                if (res.ok) alert('✅ Foto guardada');
                else alert('❌ Error: cámara apagada o sin señal');
                return;
            }
            // Optimistic: toggle button immediately
            const btnEnc = card.querySelector('.btnEncendido');
            const btnRec = card.querySelector('.btnVideo');
            const btnDet = card.querySelector('.btnMovimiento');
            if (endpoint === '/toggle_camara') {
                const on = btnEnc.innerText === "Apagar";
                btnEnc.innerText = on ? "Encender" : "Apagar";
                btnEnc.className = `btnEncendido ${!on ? 'active' : ''}`;
            } else if (endpoint === '/toggle_video') {
                const on = btnRec.innerText === "Detener Grabar";
                btnRec.innerText = on ? "Grabar" : "Detener Grabar";
                btnRec.className = `btnVideo ${!on ? 'recording' : ''}`;
            } else if (endpoint === '/toggle_deteccion') {
                const on = btnDet.innerText === "Det: ON";
                btnDet.innerText = on ? "Det: OFF" : "Det: ON";
                btnDet.className = `btnMovimiento ${!on ? 'active' : ''}`;
            }
        }

        function cambiarResolucion(camId, select) {
            const dims = select.value.split('x');
            fetch('/set_resolucion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ camera_id: camId, ancho: dims[0], alto: dims[1] })
            });
        }

        // Sync periódico cada 3 segundos
        setInterval(() => {
            camCards.forEach(({card, id}) => updateCard(card, id));
        }, 3000);

        fetch('/listar_camaras')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('camGrid');
                data.camaras.forEach(camId => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${camId}</h3>
                        <img class="visor" src="/video_feed/${camId}">
                        <div class="controls">
                            <button class="btnEncendido" onclick="action('${camId}', '/toggle_camara', this.parentElement.parentElement)">Encender</button>
                            <button class="btnFoto" onclick="action('${camId}', '/tomar_foto', this.parentElement.parentElement)">Foto</button>
                            <button class="btnVideo" onclick="action('${camId}', '/toggle_video', this.parentElement.parentElement)">Grabar</button>
                            <button class="btnMovimiento" onclick="action('${camId}', '/toggle_deteccion', this.parentElement.parentElement)">Det: OFF</button>
                        </div>
                        <select class="resolution" onchange="cambiarResolucion('${camId}', this)">
                            <option value="320x240">320 x 240 (Baja)</option>
                            <option value="640x480" selected>640 x 480 (Estándar)</option>
                            <option value="1280x720">1280 x 720 (HD)</option>
                        </select>
                    `;
                    grid.appendChild(card);
                    camCards.push({card, id: camId});
                    updateCard(card, camId);
                });
            });
    </script>
</body>
</html>
