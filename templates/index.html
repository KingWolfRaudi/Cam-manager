<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara de la Chromebook</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            margin-top: 30px;
        }
        img {
            border: 5px solid #555;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            width: 100%;
            /* Quitamos el max-width estricto para poder ver cuando la imagen se agrande */
            max-width: 80vw; 
            margin-bottom: 20px;
        }
        .controles {
            display: flex;
            gap: 15px;
            align-items: center; /* Alinea los botones y el selector al centro */
            margin-bottom: 20px;
        }
        button, select {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        /* Estilos para nuestro nuevo selector de resolución */
        select {
            background-color: #555;
            color: white;
            border: 1px solid #777;
        }
        
        #btnFoto { background-color: #4CAF50; color: white; }
        #btnFoto:hover { background-color: #45a049; }
        
        #btnVideo { background-color: #2196F3; color: white; }
        #btnVideo:hover { background-color: #0b7dda; }
        #btnVideo.grabando { background-color: #f44336; }
        #btnVideo.grabando:hover { background-color: #da190b; }
    </style>
</head>
<body>

    <h1>Cámara del Servidor Ubuntu</h1>
    
    <div class="controles">
        <select id="selectorResolucion" onchange="cambiarResolucion()">
            <option value="320x240">320 x 240 (Baja)</option>
            <option value="640x480" selected>640 x 480 (Estándar)</option>
            <option value="1280x720">1280 x 720 (HD)</option>
        </select>

        <button id="btnFoto" onclick="tomarFoto()">📸 Tomar Foto</button>
        <button id="btnVideo" onclick="grabarVideo()">🎥 Iniciar Grabación</button>
    </div>

    <img src="{{ url_for('video_feed') }}" alt="Transmisión de la cámara">

    <script>
        function tomarFoto() {
            fetch('/tomar_foto', { method: 'POST' })
                .then(respuesta => {
                    if(respuesta.ok) alert('¡Foto guardada en la carpeta "capturas"!');
                });
        }

        function grabarVideo() {
            let boton = document.getElementById('btnVideo');
            
            fetch('/toggle_video', { method: 'POST' })
                .then(respuesta => respuesta.text())
                .then(estado => {
                    if (estado === "grabando") {
                        boton.innerText = "⏹️ Detener Grabación";
                        boton.classList.add("grabando");
                    } else {
                        boton.innerText = "🎥 Iniciar Grabación";
                        boton.classList.remove("grabando");
                        alert('¡Video guardado en la carpeta "capturas"!');
                    }
                });
        }

        // --- NUEVA FUNCIÓN PARA CAMBIAR RESOLUCIÓN ---
        function cambiarResolucion() {
            let selector = document.getElementById('selectorResolucion');
            // Separamos el valor, ej: de "1280x720" sacamos "1280" y "720"
            let dimensiones = selector.value.split('x');
            let ancho = dimensiones[0];
            let alto = dimensiones[1];

            // Enviamos los datos a Python en formato JSON
            fetch('/set_resolucion', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ancho: ancho, alto: alto })
            }).then(respuesta => {
                if(respuesta.ok) {
                    console.log("Petición de resolución enviada exitosamente.");
                }
            });
        }
    </script>
</body>
</html>
